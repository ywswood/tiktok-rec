<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TikTokRec</title>
  <link rel="manifest" href="manifest.json">
  <link href="style.css" rel="stylesheet">
  <!-- Google Fonts for Typography -->
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700&family=Kaushan+Script&family=Orbitron:wght@700&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="container">

    <!-- Header -->
    <header id="appHeader">
      <h1>話すだけで<br><span class="highlight">MP4動画</span>が完成。</h1>
      <p class="subtitle">Gemini 3 Flashがトレンド構成を自動生成</p>
    </header>

    <!-- Main Recording Button -->
    <div class="main-area">
      <div id="recButton" class="rec-button-wrapper">
        <div class="rec-ring"></div>
        <div class="rec-fill">
          <div class="rec-icon">🎙️</div>
          <div class="rec-text" id="recText">RECORDING</div>
        </div>
      </div>

      <!-- Video Preview (Hidden initially) -->
      <div id="videoContainer" class="video-container hidden">
        <div id="videoScreen" class="video-screen">
          <div id="videoBg" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:1;"></div>
          <div id="sceneText" class="scene-text" data-text=""></div>
        </div>
      </div>
    </div>

    <!-- Bottom Controls (Status & Result Actions) -->
    <div class="controls-area">
      <div id="status" style="margin-bottom: 15px; color: #888; font-size: 0.8rem;">タップして録音を開始</div>

      <div id="resultControls" class="hidden" style="display: flex; gap: 10px;">
        <button id="resetBtn"
          style="flex:1; padding: 15px; border-radius: 30px; border:none; background:#333; color:#fff; font-weight:bold; cursor:pointer;">新しく作る</button>
        <button id="copyBtn"
          style="flex:1; padding: 15px; border-radius: 30px; border:none; background: linear-gradient(90deg, #00f2ea, #ff0050); color:#fff; font-weight:bold; cursor:pointer;">台本コピー</button>
      </div>

      <!-- Hidden data storage -->
      <div id="resultBox" class="hidden">
        <span id="resHook"></span>
        <span id="resTags"></span>
        <span id="resCaption"></span>
      </div>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>

</html>
